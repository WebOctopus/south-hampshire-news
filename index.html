<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="South Hampshire's Leading Local Magazine Group" />
    <meta property="og:description" content="South Hampshire's Biggest Little Magazine - Local Stories, Events & Business Advertising" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://qrbijjlviizhzuswiilf.supabase.co/functions/v1/widget-loader?id=f532ace8-8e6d-4694-81d1-ef91e7f36915" async></script>
    <script>
      (function () {
        var CLOSE_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
        var HEIGHT_OVERRIDE_STYLE_ID = 'octopus-chat-height-override';
        var HEIGHT_OVERRIDE_CSS = [
          /* Desktop: shorter popout so the chat clears the page header */
          '#octopus-chat-container.octopus-open:not(.octopus-mobile){',
            'max-height:calc(100vh - 160px)!important;',
          '}',
          /* Lift the chat window above the bubble so the bubble stays clickable as the close (X) button */
          '#octopus-chat-container.octopus-open:not(.octopus-mobile) #octopus-chat-window{',
            'bottom:80px!important;',
          '}',
          /* Keep the bubble visible when open so it can act as the close (X) button */
          '#octopus-chat-container.octopus-open:not(.octopus-mobile) #octopus-chat-bubble{',
            'display:flex!important;',
          '}'
        ].join('');
        var originalBubbleHTML = null;
        var wired = false;

        function isOpen(container) {
          if (!container) return false;
          if (container.classList && (container.classList.contains('octopus-open') || container.classList.contains('open'))) return true;
          if (container.getAttribute && container.getAttribute('aria-expanded') === 'true') return true;
          // Fallback: container has visible children with size
          var rect = container.getBoundingClientRect();
          return rect.width > 80 && rect.height > 80;
        }

        function applyIcon(bubble, container) {
          if (!bubble) return;
          if (isOpen(container)) {
            if (bubble.innerHTML !== CLOSE_SVG) {
              bubble.setAttribute('data-octopus-close', 'true');
              bubble.innerHTML = CLOSE_SVG;
            }
          } else {
            if (bubble.getAttribute('data-octopus-close') === 'true' && originalBubbleHTML !== null) {
              bubble.removeAttribute('data-octopus-close');
              bubble.innerHTML = originalBubbleHTML;
            }
          }
        }

        function toggle() {
          try {
            if (window.OctopusChat && typeof window.OctopusChat.toggle === 'function') {
              window.OctopusChat.toggle();
              return true;
            }
          } catch (e) {}
          return false;
        }

        function injectHeightOverride() {
          if (document.getElementById(HEIGHT_OVERRIDE_STYLE_ID)) return;
          var style = document.createElement('style');
          style.id = HEIGHT_OVERRIDE_STYLE_ID;
          style.textContent = HEIGHT_OVERRIDE_CSS;
          document.head.appendChild(style);
        }

        function wire(bubble, container) {
          if (wired) return;
          wired = true;
          injectHeightOverride();
          if (originalBubbleHTML === null) originalBubbleHTML = bubble.innerHTML;

          bubble.addEventListener('click', function (e) {
            // Let widget's own handler run for opening; only intercept when open to close via X
            if (bubble.getAttribute('data-octopus-close') === 'true') {
              e.preventDefault();
              e.stopPropagation();
              if (!toggle()) {
                // Fallback: dispatch a click on any close button inside container
                var closeBtn = container && container.querySelector('[aria-label="Close"], .octopus-close, button.close');
                if (closeBtn) closeBtn.click();
              }
              // Force icon back after a tick
              setTimeout(function () { applyIcon(bubble, container); }, 50);
            }
          }, true);

          if (container) {
            var mo = new MutationObserver(function () { applyIcon(bubble, container); });
            mo.observe(container, { attributes: true, attributeFilter: ['class', 'style', 'aria-expanded'], childList: true, subtree: false });
          }
          // Poll as a safety net
          setInterval(function () { applyIcon(bubble, container); }, 300);
        }

        var bootObserver = new MutationObserver(function () {
          var bubble = document.getElementById('octopus-chat-bubble');
          var container = document.getElementById('octopus-chat-container');
          if (bubble && !wired) wire(bubble, container);
        });
        bootObserver.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
