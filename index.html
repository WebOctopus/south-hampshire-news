<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Hampshire's Leading Local Magazine Group</title>
    <meta name="description" content="South Hampshire's Biggest Little Magazine - Local Stories, Events & Business Advertising" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arima+Madurai:wght@100;200;300;400;500;600;700;800;900&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="author" content="Discover Magazine" />

    <meta property="og:title" content="South Hampshire's Leading Local Magazine Group" />
    <meta property="og:description" content="South Hampshire's Biggest Little Magazine - Local Stories, Events & Business Advertising" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/lovable-uploads/discover-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/lovable-uploads/discover-logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      #octopus-chat-container.octopus-open:not(.octopus-mobile) {
        bottom: 88px !important;
        left: 20px !important;
        right: auto !important;
        width: 380px !important;
        max-width: calc(100vw - 40px) !important;
        height: min(520px, calc(100vh - 140px)) !important;
        padding: 0 !important;
      }
      /* Keep the launcher bubble visible when the chat is open so it can act as a close (X) button */
      #octopus-chat-container.octopus-open:not(.octopus-mobile) #octopus-chat-bubble {
        display: flex !important;
        position: fixed !important;
        bottom: 20px !important;
        left: 20px !important;
        right: auto !important;
        top: auto !important;
      }
    </style>
    <script
      src="https://qrbijjlviizhzuswiilf.supabase.co/functions/v1/widget-loader?id=f532ace8-8e6d-4694-81d1-ef91e7f36915"
      data-position="left"
      data-offset-x="20"
      data-offset-y="20"
      data-color="#10b981"
      async
    ></script>
    <script>
      (function () {
        var CHAT_SVG =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
        var CLOSE_SVG =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';

        function applyIcon(container, bubble) {
          var open = container.classList.contains('octopus-open');
          bubble.innerHTML = open ? CLOSE_SVG : CHAT_SVG;
          bubble.setAttribute('aria-label', open ? 'Close chat' : 'Open chat');
        }

        function init() {
          var container = document.getElementById('octopus-chat-container');
          var bubble = document.getElementById('octopus-chat-bubble');
          if (!container || !bubble || !window.OctopusChat) {
            return false;
          }

          // Strip the loader's built-in click listener by cloning the node,
          // then re-attach a single toggle handler so a click while open closes
          // and a click while closed opens (no double-firing).
          var fresh = bubble.cloneNode(true);
          bubble.parentNode.replaceChild(fresh, bubble);
          bubble = fresh;

          applyIcon(container, bubble);

          bubble.addEventListener('click', function () {
            window.OctopusChat.toggle();
          });

          // Keep the icon in sync with open/close state (header X, Escape, etc.).
          var observer = new MutationObserver(function () {
            applyIcon(container, bubble);
          });
          observer.observe(container, { attributes: true, attributeFilter: ['class'] });

          return true;
        }

        var attempts = 0;
        var timer = setInterval(function () {
          attempts += 1;
          if (init() || attempts > 100) {
            clearInterval(timer);
          }
        }, 100);
      })();
    </script>
  </body>
</html>
